<!-- main page for project -->
<!-- there will be search bar on computer, and popular animes and other categories on both-->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="AniVerse Project">
        <meta name="author" content="Lena Deriso">
        <title>Contact Us</title>
        <!-- using axios link-->
         <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <!-- end using axios link-->
        <link rel="stylesheet" href="contactStyles.css"/>
    </head>
    <body>
        <header>
            <!-- navbar-->
            <nav class="navbar">
                <div class="navbar-inner">
                <div class="logo">
                    <a href="/"><span class="tilt">A</span>ni<span class="tilt">V</span>erse</a>
                </div>

                <!-- only visible on mobile -->
                <div class="menu-toggle">☰</div>

                <!-- regular nav tab links -->
                <ul class="nav-links">
                    <li id="animes"><a href="index.html">Animes</a></li>
                    <li id="watched">Watched</li>
                    <li><a href="watchlist.html">Watchlist</a></li>
                    <li id="signin">Sign in</li>

                    <!-- search only appears for mobile -->
                    <li><a href="#" class="nav-search-btn" id="navSearchBtn">Search</a></li>
                </ul>
                <!-- end nav tab links -->

                <!-- activates once search button is hit -->
                <div class="nav-search" id="navSearch">
                    <div class="nav-search-container">
                    <input
                            type="search"
                            id="mobileQuery"
                            placeholder="Search for anime..."
                            autocomplete="off"
                            required
                            />
                    <div class="dropdown" id="mobileDropdown"></div>
                    </div>
                </div>
                <!-- end of activates once saarch button hit-->

                </div>
            </nav>
            <!-- end of navbar -->
        </header>
        <main class="main-back">
            <div class="page-container">
                <div class="contact-title-container">
                    <h1 class="contact-title">Contact Us!</h1>
                </div>

                <div class="contact-form-container">
                    <form class="contact-form" id="contactForm">

                        <div class="form-grid">

                            <div class="form-group">
                                <label for="name">Name<span>*</span></label>
                                <input name="name" type="text" placeholder="Name" id="name" autocomplete="name" required/>
                            </div>

                            <div class="form-group">
                                <label for="email">Email<span>*</span></label>
                                <input name="email" type="email" placeholder="Email" id="email" autocomplete="email" required />
                            </div>

                            <div class="form-group">
                                <label for="anime_title">Anime Title<span>*</span></label>
                                <input name="anime_title" type="text" placeholder="Enter title..." id="anime_title" required />
                            </div>

                            <div class="form-group full">
                                <label for="message">Message</label>
                                <textarea name="message" placeholder="Type a message..." id="message" rows="5"></textarea>
                            </div>

                        </div>

                        <div>

                            <button type="submit" class="submit-btn">Submit</button>

                        </div>


                    </form>
                </div>
            </div>
        </main>
        <aside>
        <!-- Ill have a sidebar and when its small enough it will go below -->
        </aside>
        <footer class="footer">
            <div class="footer-content">
            <p>
                © AniVerse · Made by Lena Deriso · Anime data from Jikan API
                <!-- <a href="#">Mobile site</a>. -->
            </p>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script src="contactScript.js"></script>
    </body>
</html>
